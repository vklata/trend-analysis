<div class="erp-header">

<div class="left-section">

  <h2 class="page-title">
    MVM Trend Analysis Report
  </h2>

  <span class="page-module">
    {{ pageName }}
  </span>

</div>

  <div class="right-section"> 

     <div class="live-badge">
      <span class="live-dot"></span>
      LIVE 2026-27
    </div> 

     <div class="session-switch">

      <button
        [class.active]="selectedSession==='2025-26'"
        (click)="changeSession('2025-26')">
        2025-26
      </button>

      <button
        [class.active]="selectedSession==='2026-27'"
        (click)="changeSession('2026-27')">
        2026-27
      </button>

    </div>

    <button class="compare-btn">
      Compare
    </button>

  <select
  class="erp-select state-select"
  [(ngModel)]="selectedState"
  (change)="onStateChange()">

  <option *ngFor="let state of states">
    {{ state }}
  </option>

</select>

<select
  class="erp-select branch-select"
  [(ngModel)]="selectedBranch"
  (change)="onBranchChange($event)">

  <option *ngFor="let branch of filteredBranches">
    {{branch}}
  </option>

</select>
<button
  class="export-btn"
  (click)="exportCurrentPage()">

  <i class="fa fa-download"></i>
  Export

</button>
    <!-- <button class="export-btn">
      ⬇ Export
    </button> -->

  </div>

</div>
