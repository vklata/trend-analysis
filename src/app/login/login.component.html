<div class="login-container">

  <div class="login-card">

    <h2>Trend Analysis</h2>

    <input
      type="text"
      [(ngModel)]="username"
      placeholder="Username"
    >

    <input
      type="password"
      [(ngModel)]="password"
      placeholder="Password"
    >

    <button (click)="login()">
      Login
    </button>

    <p class="error">
      {{errorMessage}}
    </p>

  </div>

</div>
